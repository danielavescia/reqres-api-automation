name: ReqRes API Testing CI

on:
  push:
    branches["dev"]

  pull_request:
    branches["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código 
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Rodar testes
        run: mvn clean test 
        env:
          API_KEY: ${{ secrets.API_KEY }}